<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Fixture: inconsistent app states the projection must expose</title>
		<link rel="stylesheet" href="/app.css">
	</head>
	<body>
		<section class="todoapp">
			<header class="header">
				<h1>todos</h1>
				<input class="new-todo" placeholder="What needs to be done?">
			</header>
			<section class="main">
				<input id="toggle-all" class="toggle-all" type="checkbox">
				<label for="toggle-all">Mark all as complete</label>
				<ul class="todo-list">
					<!-- checkbox checked but NOT styled as completed -->
					<li data-id="c1">
						<div class="view">
							<input class="toggle" type="checkbox" checked>
							<label>checked not styled</label>
							<button class="destroy"></button>
						</div>
						<input class="edit" value="checked not styled">
					</li>
					<!-- styled as completed but checkbox NOT checked -->
					<li class="completed" data-id="c2">
						<div class="view">
							<input class="toggle" type="checkbox">
							<label>styled not checked</label>
							<button class="destroy"></button>
						</div>
						<input class="edit" value="styled not checked">
					</li>
					<!-- row without a data-id attribute -->
					<li>
						<div class="view">
							<input class="toggle" type="checkbox">
							<label>no id here</label>
							<button class="destroy"></button>
						</div>
						<input class="edit" value="no id here">
					</li>
					<!-- editing row whose normal view is buggily still shown -->
					<li class="editing" data-id="c4">
						<div class="view" style="display:block">
							<input class="toggle" type="checkbox">
							<label>half editing</label>
							<button class="destroy"></button>
						</div>
						<input class="edit" value="half editing now">
					</li>
				</ul>
			</section>
			<footer class="footer">
				<span class="todo-count"><strong>3</strong> items left</span>
			</footer>
		</section>
	</body>
</html>
